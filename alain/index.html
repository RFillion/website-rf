<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 Surprise, Alain !</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #FF3B6F;
            --gold: #FFD700;
            --coral: #FF6B35;
            --cyan: #00D4FF;
            --dark: #080810;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--dark);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255, 59, 111, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.10) 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, rgba(255, 215, 0, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0;
            animation: twinkle var(--duration, 3s) var(--delay, 0s) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--max-opacity, 0.6); transform: scale(1); }
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 22vw, 16rem);
            letter-spacing: 0.15em;
            color: white;
            line-height: 1;
            opacity: 0.12;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, 0);
            pointer-events: none;
            white-space: nowrap;
            z-index: 1;
            user-select: none;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            text-align: center;
            padding: 2rem;
        }

        .hint {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.28);
            transition: opacity 0.6s ease;
        }

        .gift-wrapper {
            position: relative;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .gift-svg {
            width: 210px;
            height: 210px;
            animation: float 2.8s ease-in-out infinite;
            filter: drop-shadow(0 0 22px rgba(255, 59, 111, 0.5))
                    drop-shadow(0 0 50px rgba(255, 215, 0, 0.2));
            transition: filter 0.3s ease;
            display: block;
        }

        .gift-wrapper:hover .gift-svg {
            filter: drop-shadow(0 0 40px rgba(255, 59, 111, 0.85))
                    drop-shadow(0 0 80px rgba(255, 215, 0, 0.45));
        }

        .gift-wrapper:active .gift-svg {
            transform: scale(0.94);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50%       { transform: translateY(-18px) rotate(2deg); }
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.25);
            animation: ripple-out 0.65s ease-out forwards;
            pointer-events: none;
        }

        @keyframes ripple-out {
            to { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* Message */
        .message-container {
            opacity: 0;
            transform: translateY(28px) scale(0.92);
            transition: opacity 0.9s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 640px;
        }

        .message-container.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .message-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.9rem;
            opacity: 0.75;
        }

        .divider {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 1.1rem;
            opacity: 0;
            transition: opacity 0.8s ease 0.5s;
        }

        .divider.visible {
            opacity: 1;
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: clamp(1.55rem, 4vw, 2.7rem);
            line-height: 1.35;
            background: linear-gradient(120deg, #FFD700 0%, #FF3B6F 40%, #FF6B35 70%, #FFD700 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3.5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Corner decorations */
        .decoration {
            position: fixed;
            font-size: 1.9rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .decoration.visible {
            opacity: 1;
            animation: spin-float var(--dur, 4s) var(--dly, 0s) ease-in-out infinite;
        }

        @keyframes spin-float {
            0%, 100% { transform: translateY(0px)   rotate(0deg); }
            50%       { transform: translateY(-16px) rotate(18deg); }
        }
    </style>
</head>
<body>

    <div class="page-title">ALAIN</div>
    <div class="stars" id="stars"></div>

    <div class="decoration" id="d1" style="top:12%; left:8%;  --dur:5s;   --dly:0s">🎉</div>
    <div class="decoration" id="d2" style="top:16%; right:9%; --dur:4.5s; --dly:0.4s">✨</div>
    <div class="decoration" id="d3" style="bottom:18%; left:7%;  --dur:6s;   --dly:0.9s">🥂</div>
    <div class="decoration" id="d4" style="bottom:14%; right:8%; --dur:4s;   --dly:0.2s">🎊</div>
    <div class="decoration" id="d5" style="top:42%; left:4%;  --dur:5.5s; --dly:0.7s">⭐</div>
    <div class="decoration" id="d6" style="top:38%; right:5%; --dur:3.8s; --dly:1.1s">🎈</div>

    <div class="content">
        <p class="hint" id="hint">Clique sur le cadeau</p>

        <div class="gift-wrapper" id="giftWrapper" onclick="boom(this)">
            <svg class="gift-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Box body -->
                <rect x="20" y="100" width="160" height="88" rx="7" fill="url(#boxGrad)"/>

                <!-- Box lid -->
                <rect x="12" y="78" width="176" height="28" rx="7" fill="url(#lidGrad)"/>

                <!-- Ribbon vertical (box) -->
                <rect x="88" y="100" width="24" height="88" fill="url(#rvGrad)"/>

                <!-- Ribbon horizontal (lid) -->
                <rect x="12" y="84" width="176" height="16" fill="url(#rhGrad)"/>

                <!-- Bow left loop -->
                <ellipse cx="81" cy="70" rx="32" ry="15" transform="rotate(-28 81 70)" fill="#FFD700"/>
                <ellipse cx="81" cy="70" rx="23" ry="9"  transform="rotate(-28 81 70)" fill="#FFC200"/>

                <!-- Bow right loop -->
                <ellipse cx="119" cy="70" rx="32" ry="15" transform="rotate(28 119 70)" fill="#FFD700"/>
                <ellipse cx="119" cy="70" rx="23" ry="9"  transform="rotate(28 119 70)" fill="#FFC200"/>

                <!-- Bow knot -->
                <ellipse cx="100" cy="74" rx="14" ry="14" fill="#FFD700"/>
                <ellipse cx="100" cy="74" rx="9"  ry="9"  fill="#FFE84D"/>

                <!-- Shine on lid -->
                <rect x="18" y="81" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.22)"/>

                <!-- Polka dots on box -->
                <circle cx="52"  cy="128" r="5" fill="rgba(255,255,255,0.18)"/>
                <circle cx="72"  cy="150" r="4" fill="rgba(255,255,255,0.13)"/>
                <circle cx="148" cy="122" r="6" fill="rgba(255,255,255,0.18)"/>
                <circle cx="132" cy="152" r="4" fill="rgba(255,255,255,0.13)"/>
                <circle cx="50"  cy="165" r="3" fill="rgba(255,255,255,0.10)"/>
                <circle cx="150" cy="165" r="3" fill="rgba(255,255,255,0.10)"/>

                <defs>
                    <linearGradient id="boxGrad" x1="20" y1="100" x2="180" y2="188" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#FF5A80"/>
                        <stop offset="100%" stop-color="#C41A46"/>
                    </linearGradient>
                    <linearGradient id="lidGrad" x1="12" y1="78" x2="188" y2="106" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#FF708E"/>
                        <stop offset="100%" stop-color="#E02E5C"/>
                    </linearGradient>
                    <linearGradient id="rvGrad" x1="88" y1="100" x2="112" y2="188" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#FFE44D"/>
                        <stop offset="100%" stop-color="#E6A800"/>
                    </linearGradient>
                    <linearGradient id="rhGrad" x1="12" y1="84" x2="188" y2="100" gradientUnits="userSpaceOnUse">
                        <stop offset="0%"   stop-color="#FFE44D"/>
                        <stop offset="100%" stop-color="#E6A800"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="message-container" id="message">
            <p class="message-label">✦ &nbsp; Joyeux anniversaire &nbsp; ✦</p>
            <div class="divider" id="divider"></div>
            <p class="message-text">Bravo, tu as gagné une soirée au&nbsp;Bordel avec&nbsp;nous&nbsp;!</p>
        </div>
    </div>

    <script>
        // Twinkling stars background
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 90; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = 1 + Math.random() * 2.5;
            s.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                --duration: ${2 + Math.random() * 4}s;
                --delay: ${Math.random() * 6}s;
                --max-opacity: ${0.15 + Math.random() * 0.55};
            `;
            starsEl.appendChild(s);
        }

        let clicked = false;

        function boom(wrapper) {
            if (clicked) return;
            clicked = true;

            // Ripple
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            wrapper.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);

            // Fade hint
            document.getElementById('hint').style.opacity = '0';

            // Gift jump animation
            const svg = wrapper.querySelector('.gift-svg');
            svg.style.animation = 'none';
            svg.style.transform = 'scale(1.18) rotate(0deg)';
            svg.style.transition = 'transform 0.15s ease';
            setTimeout(() => {
                svg.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease';
                svg.style.transform = 'scale(0.88)';
                svg.style.filter = 'drop-shadow(0 0 70px rgba(255,215,0,1)) drop-shadow(0 0 110px rgba(255,59,111,0.9))';
            }, 120);
            setTimeout(() => {
                svg.style.transform = 'scale(1)';
            }, 460);

            // Confetti — main burst
            const origin = { y: 0.52 };
            const bursts = [
                { ratio: 0.25, opts: { spread: 26,  startVelocity: 58, colors: ['#FFD700','#FF3B6F','#FF6B35'] } },
                { ratio: 0.20, opts: { spread: 65,               colors: ['#00D4FF','#FFD700','#FF3B6F'] } },
                { ratio: 0.35, opts: { spread: 105, decay: 0.91, scalar: 0.8, colors: ['#FFD700','#FFFFFF','#FF6B35'] } },
                { ratio: 0.10, opts: { spread: 125, startVelocity: 24, decay: 0.92, scalar: 1.2, colors: ['#FF3B6F','#00D4FF'] } },
                { ratio: 0.10, opts: { spread: 125, startVelocity: 46, colors: ['#FFD700','#FF3B6F','#FF6B35','#00D4FF'] } },
            ];
            bursts.forEach(({ ratio, opts }) => {
                confetti(Object.assign({ origin, particleCount: Math.floor(400 * ratio) }, opts));
            });

            // Side cannons
            setTimeout(() => {
                confetti({ particleCount: 90, angle: 60,  spread: 55, origin: { x: 0 },   colors: ['#FFD700','#FF3B6F','#FF6B35'] });
                confetti({ particleCount: 90, angle: 120, spread: 55, origin: { x: 1 },   colors: ['#00D4FF','#FFD700','#FF3B6F'] });
            }, 320);

            // Reveal message + decorations
            setTimeout(() => {
                document.getElementById('message').classList.add('visible');
                document.getElementById('divider').classList.add('visible');
                ['d1','d2','d3','d4','d5','d6'].forEach((id, i) => {
                    setTimeout(() => document.getElementById(id).classList.add('visible'), i * 140);
                });
            }, 520);
        }
    </script>
</body>
</html>
